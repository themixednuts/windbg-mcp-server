name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - name: stdio
            features: ""
            artifact: windbg-mcp-server.exe
          - name: http
            features: "--features http"
            artifact: windbg-mcp-server-http.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release ${{ matrix.features }}

      - name: Rename binary
        run: cp target/release/windbg-mcp-server.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.artifact }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/stdio/windbg-mcp-server.exe
            artifacts/http/windbg-mcp-server-http.exe
